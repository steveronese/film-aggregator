name: Scrape & publish

# Daily: re-scrape every venue, re-match against TMDB, validate the site builds, and commit the
# refreshed data. Cloudflare Pages (connected to this repo via Git) rebuilds & deploys on the push.
on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC ≈ 07:00 Europe/Rome
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # No `playwright install` here: the only headless scraper (Cinema Godard) is gated to
      # residential IPs via ENABLE_HEADLESS — its WAF blocks datacenter IPs. run.py preserves
      # Godard's last-known-good screenings on the cloud cron; refresh it with a local scrape.

      - name: Scrape venues & match TMDB (AI fallback via Mistral)
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python -m scrapers.run

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Validate the site builds with the fresh data
        run: |
          cd site
          npm ci
          npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "schermomilano-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data scrapers/cache
          git diff --staged --quiet || git commit -m "data: daily refresh $(date -u +%F)"
          git push
